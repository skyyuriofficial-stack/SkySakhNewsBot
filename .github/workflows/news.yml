name: SkySakhNews Auto Publisher

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. Sakhalin = UTC+11.
    # 07:00, 10:00, 13:00, 16:00, 19:00, 22:00 Sakhalin
    # = 20:00, 23:00, 02:00, 05:00, 08:00, 11:00 UTC.
    - cron: "0 2,5,8,11,20,23 * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        run: |
          python src/news_bot.py

      - name: Commit updated state
        run: |
          git config user.name "skysakhnews-bot"
          git config user.email "actions@github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "Update news state"
            git push
          fi
