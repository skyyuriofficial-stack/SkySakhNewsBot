name: SkySakhNews Direct Publisher Manual Only

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: skysakhnews-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run direct publisher manually
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          IMAGE_REQUIRED: "0"
        run: |
          echo "Direct publisher is manual-only. Normal mode is editorial queue."
          python -m py_compile src/news_bot_v11.py
          python src/news_bot_v11.py

      - name: Commit updated state
        run: |
          set -e
          git config user.name "skysakhnews-bot"
          git config user.email "actions@github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "Update news state"
            git pull --rebase origin main || true
            git push origin main
          fi
