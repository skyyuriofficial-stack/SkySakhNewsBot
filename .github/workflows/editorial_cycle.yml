name: SkySakhNews Editorial Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: "5 2,5,8,11,20,23 * * *"

permissions:
  contents: write

concurrency:
  group: skysakhnews-editorial-cycle
  cancel-in-progress: false

jobs:
  editorial-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Collect drafts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          IMAGE_REQUIRED: "0"
          EDITORIAL_COLLECT_LIMIT: "10"
        run: |
          python -m py_compile src/editorial_queue.py
          python src/editorial_queue.py collect
      - name: Review drafts
        env:
          EDITORIAL_REVIEW_APPROVE_LIMIT: "2"
          EDITORIAL_REVIEW_PENDING_MAX_HOURS: "20"
        run: |
          python -m py_compile src/editorial_review.py
          python src/editorial_review.py
      - name: Final guard
        run: |
          python -m py_compile src/editorial_guard.py
          python src/editorial_guard.py
      - name: Publish approved drafts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          IMAGE_REQUIRED: "0"
          EDITORIAL_PUBLISH_LIMIT: "2"
        run: python src/editorial_queue.py publish
      - name: Commit queue and state
        run: |
          git config user.name "skysakhnews-bot"
          git config user.email "actions@github.com"
          git add editorial_queue.json state.json
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Run editorial cycle"; git pull --rebase origin main || true; git push origin main; fi
