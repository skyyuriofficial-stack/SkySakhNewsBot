name: SkySakhNews Auto Publisher V8

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2,5,8,11,20,23 * * *"

permissions:
  contents: write

concurrency:
  group: skysakhnews-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run publisher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          IMAGE_REQUIRED: "1"
          POSTS_PER_RUN: "2"
          MAX_AGE_HOURS: "36"
        run: |
          python -m py_compile src/news_bot_v8.py
          python src/news_bot_v8.py
      - name: Commit state
        run: |
          git config user.name "skysakhnews-bot"
          git config user.email "actions@github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "Update news state"
            git push
          fi
