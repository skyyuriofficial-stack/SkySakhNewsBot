name: SkySakhNews Minimum Release

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - SkySakhNews Editorial Cycle
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: skysakhnews-minimum-release
  cancel-in-progress: false

jobs:
  minimum-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Apply minimum release policy
        run: |
          python -m py_compile src/editorial_minimum_release.py
          python src/editorial_minimum_release.py
      - name: Final guard
        run: |
          python -m py_compile src/editorial_guard.py
          python src/editorial_guard.py
      - name: Publish approved image posts only
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          IMAGE_REQUIRED: "0"
          EDITORIAL_PUBLISH_LIMIT: "1"
        run: |
          python -m py_compile src/editorial_publish_safe.py
          python src/editorial_publish_safe.py
      - name: Commit queue and state
        run: |
          git config user.name "skysakhnews-bot"
          git config user.email "actions@github.com"
          git add editorial_queue.json state.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Run minimum release"
            git pull --rebase origin main || true
            git push origin main
          fi
