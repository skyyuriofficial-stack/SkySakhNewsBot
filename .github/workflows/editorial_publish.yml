name: SkySakhNews Publish Approved

on:
  workflow_dispatch:
  push:
    paths:
      - "editorial_queue.json"
  schedule:
    # Sakhalin 07:25, 10:25, 13:25, 16:25, 19:25, 22:25
    - cron: "25 2,5,8,11,20,23 * * *"

permissions:
  contents: write

concurrency:
  group: skysakhnews-editorial-queue
  cancel-in-progress: false

jobs:
  publish-approved:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Publish approved drafts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          IMAGE_REQUIRED: "0"
          EDITORIAL_PUBLISH_LIMIT: "2"
        run: |
          python -m py_compile src/editorial_queue.py
          python src/editorial_queue.py publish

      - name: Commit queue and state
        run: |
          set -e
          git config user.name "skysakhnews-bot"
          git config user.email "actions@github.com"
          git add editorial_queue.json state.json
          if git diff --cached --quiet; then
            echo "No queue/state changes"
          else
            git commit -m "Publish approved editorial posts"
            git pull --rebase origin main || true
            git push origin main
          fi
